services:
  mysql:
    image: 'mysql:8.0'
    restart: on-failure
    container_name: gastro-link-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gastro_link}
      MYSQL_USER: ${MYSQL_USER:-myuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_HOST: 'localhost'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --max_connections=1000
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 30s
      retries: 15
      start_period: 40s
    networks:
      - gastro-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastro-link-app
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-gastro_link}
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-myuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-secret}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: 'false'
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gastro-network

volumes:
  mysql_data:

networks:
  gastro-network:
    driver: bridge

