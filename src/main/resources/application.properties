spring.application.name=gastro-link-api-clean-architecture

spring.datasource.url="jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:gastro_link}"
spring.datasource.username=${MYSQL_USER:myuser}
spring.datasource.password=${MYSQL_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

spring.jpa.properties.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.database=mysql