spring.application.name=gastro-link-api-clean-architecture

spring.datasource.url=jdbc:mysql://localhost:3306/gastro_link?createDatabaseIfNotExist=true
spring.datasource.username=myuser
spring.datasource.password=secret
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.jdbc.lob.non_contextual_creation=true
spring.jpa.show-sql=true
spring.jpa.database=mysql